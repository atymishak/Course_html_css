<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .box{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 100vh;
            flex-wrap: wrap;
        }
   .item {width: 200px;
   height: 200px;
   background: linear-gradient(90deg,rgba(2, 0, 36, 1) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 212, 255, 1) 100%);
       border-radius: 30%;
       border: 3px solid yellow;
       transition: 2s;
       display: flex;
       justify-content: center;
       align-items: center;
   }
   .item a{
       text-decoration: none;
       color:orange;

   }
   .item:hover{
       border-radius: 0;
       border: 5px solid darkblue;
       transition: 2s;
       transform: scale(1.5);

   }
   .item:hover a{
       color:green;
   }

    </style>
</head>
<body>
<div class="box">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item">
        <a href="https://www.google.com.ua/">Google</a>
    </div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>

</div>

</body>
</html>
